<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Telegram Storefront</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #f7f1e8;
      --bg-soft: #fbf7f1;
      --card: rgba(255, 255, 255, 0.74);
      --card-strong: rgba(255, 255, 255, 0.92);
      --text: #201912;
      --muted: #77695d;
      --line: rgba(44, 29, 17, 0.12);
      --brand: #ba7a38;
      --brand-deep: #8d5822;
      --brand-soft: rgba(186, 122, 56, 0.12);
      --success: #2f7a4d;
      --danger: #b54747;
      --shadow: 0 18px 45px rgba(56, 35, 17, 0.12);
      --radius-sm: 14px;
      --radius-md: 22px;
      --radius-lg: 30px;
      --max: 760px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.65), transparent 30%),
        radial-gradient(circle at top right, rgba(186,122,56,0.12), transparent 24%),
        linear-gradient(180deg, #f9f4ed 0%, #f3ebdf 100%);
      color: var(--text);
      font-family: "Manrope", sans-serif;
    }

    body {
      overflow-x: hidden;
    }

    .app {
      width: 100%;
      max-width: var(--max);
      margin: 0 auto;
      padding: 16px 14px 110px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 2px 14px;
      backdrop-filter: blur(16px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--brand), var(--brand-deep));
      color: #fff;
      display: grid;
      place-items: center;
      box-shadow: var(--shadow);
      overflow: hidden;
      flex-shrink: 0;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .brand-mark img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-name {
      margin: 0;
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-sub {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 0.8rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .icon-btn {
      border: 1px solid var(--line);
      background: var(--card-strong);
      width: 46px;
      height: 46px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      color: var(--text);
      position: relative;
      box-shadow: 0 10px 30px rgba(50, 32, 18, 0.07);
      cursor: pointer;
    }

    .cart-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      min-width: 20px;
      height: 20px;
      border-radius: 999px;
      padding: 0 6px;
      display: none;
      place-items: center;
      background: var(--brand);
      color: #fff;
      border: 2px solid var(--bg-soft);
      font-size: 0.68rem;
      font-weight: 800;
    }

    .hero {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-lg);
      background:
        radial-gradient(circle at 100% 0%, rgba(255,255,255,0.22), transparent 28%),
        radial-gradient(circle at 0% 100%, rgba(255,255,255,0.18), transparent 30%),
        linear-gradient(135deg, var(--brand) 0%, var(--brand-deep) 100%);
      color: #fff;
      padding: 24px 20px 22px;
      box-shadow: var(--shadow);
    }

    .hero::before {
      content: "";
      position: absolute;
      right: -20px;
      top: -28px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
    }

    .hero::after {
      content: "";
      position: absolute;
      left: 24px;
      bottom: -50px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }

    .eyebrow {
      position: relative;
      z-index: 1;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      opacity: 0.8;
      margin-bottom: 8px;
    }

    .hero h1 {
      position: relative;
      z-index: 1;
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: 2.15rem;
      line-height: 0.95;
      font-weight: 700;
      max-width: 10ch;
    }

    .hero p {
      position: relative;
      z-index: 1;
      margin: 10px 0 0;
      font-size: 0.94rem;
      line-height: 1.55;
      max-width: 42ch;
      opacity: 0.92;
    }

    .hero-meta {
      position: relative;
      z-index: 1;
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .hero-chip {
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.78rem;
      backdrop-filter: blur(10px);
    }

    .panel {
      margin-top: 14px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.55);
      border-radius: 24px;
      padding: 14px;
      backdrop-filter: blur(18px);
      box-shadow: 0 20px 45px rgba(49, 29, 12, 0.06);
    }

    .search {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--card-strong);
      border: 1px solid var(--line);
      border-radius: 18px;
    }

    .search input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 0.95rem;
    }

    .search input::placeholder {
      color: var(--muted);
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 18px 4px 12px;
      gap: 12px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .section-meta {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .chips {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .chips::-webkit-scrollbar {
      display: none;
    }

    .chip {
      flex-shrink: 0;
      border: 1px solid var(--line);
      background: var(--card-strong);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .chip.active {
      background: linear-gradient(135deg, var(--brand), var(--brand-deep));
      color: #fff;
      border-color: transparent;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .card {
      border: 1px solid rgba(255,255,255,0.55);
      background: var(--card-strong);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(51, 31, 13, 0.07);
      cursor: pointer;
      transform: translateY(0);
      transition: transform 0.18s ease;
    }

    .card:active {
      transform: translateY(2px) scale(0.985);
    }

    .thumb {
      position: relative;
      aspect-ratio: 1 / 1;
      background: linear-gradient(135deg, var(--brand-soft), rgba(255,255,255,0.8));
      overflow: hidden;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb-fallback {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      font-size: 3rem;
    }

    .badge {
      position: absolute;
      top: 10px;
      left: 10px;
      border-radius: 999px;
      padding: 6px 10px;
      background: rgba(32, 25, 18, 0.84);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 800;
    }

    .stock-out {
      background: rgba(181, 71, 71, 0.92);
    }

    .body {
      padding: 14px;
    }

    .cat {
      color: var(--brand-deep);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    .name {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: 1.42rem;
      line-height: 0.95;
      min-height: 2.2em;
    }

    .desc {
      margin: 8px 0 12px;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.45;
      min-height: 2.8em;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
    }

    .card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .price {
      font-weight: 800;
      font-size: 1rem;
    }

    .add {
      border: 0;
      background: linear-gradient(135deg, var(--brand), var(--brand-deep));
      color: #fff;
      border-radius: 14px;
      min-width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      cursor: pointer;
      font-size: 1.2rem;
      font-weight: 700;
      box-shadow: 0 12px 24px rgba(141, 88, 34, 0.18);
    }

    .add.added {
      background: linear-gradient(135deg, #3f8a5b, #2d6d46);
    }

    .status-card {
      padding: 26px 18px;
      border-radius: 24px;
      background: var(--card-strong);
      border: 1px solid var(--line);
      text-align: center;
      color: var(--muted);
      grid-column: 1 / -1;
    }

    .status-card h3 {
      margin: 0 0 8px;
      color: var(--text);
      font-size: 1.05rem;
    }

    .status-card button {
      margin-top: 12px;
      border: 0;
      background: linear-gradient(135deg, var(--brand), var(--brand-deep));
      color: #fff;
      border-radius: 14px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .skeleton {
      overflow: hidden;
      position: relative;
    }

    .skeleton::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.55), transparent);
      animation: shimmer 1.15s infinite;
    }

    @keyframes shimmer {
      100% {
        transform: translateX(100%);
      }
    }

    .sheet {
      position: fixed;
      inset: 0;
      z-index: 120;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.22s ease;
    }

    .sheet.open {
      opacity: 1;
      pointer-events: auto;
    }

    .sheet-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(18, 11, 5, 0.42);
    }

    .sheet-panel {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      max-width: var(--max);
      margin: 0 auto;
      background: #fbf7f1;
      border-radius: 28px 28px 0 0;
      padding: 12px 14px calc(22px + env(safe-area-inset-bottom));
      transform: translateY(100%);
      transition: transform 0.25s ease;
      max-height: 88vh;
      overflow-y: auto;
      box-shadow: 0 -20px 50px rgba(0,0,0,0.15);
    }

    .sheet.open .sheet-panel {
      transform: translateY(0);
    }

    .sheet-handle {
      width: 44px;
      height: 5px;
      border-radius: 999px;
      background: rgba(0,0,0,0.16);
      margin: 4px auto 12px;
    }

    .detail-cover {
      aspect-ratio: 1 / 1;
      border-radius: 24px;
      overflow: hidden;
      background: linear-gradient(135deg, var(--brand-soft), rgba(255,255,255,0.8));
    }

    .detail-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .detail-fallback {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      font-size: 5rem;
    }

    .detail-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-top: 16px;
    }

    .detail-top h3 {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: 2.2rem;
      line-height: 0.95;
    }

    .close-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      width: 42px;
      height: 42px;
      border-radius: 14px;
      font-size: 1.15rem;
      cursor: pointer;
      flex-shrink: 0;
    }

    .detail-copy {
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.65;
      font-size: 0.95rem;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .tag {
      padding: 8px 12px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
    }

    .detail-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 18px;
    }

    .detail-price {
      font-size: 1.32rem;
      font-weight: 800;
    }

    .detail-add {
      border: 0;
      background: linear-gradient(135deg, var(--brand), var(--brand-deep));
      color: #fff;
      padding: 14px 18px;
      border-radius: 16px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      min-width: 150px;
    }

    .checkout-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 100;
      padding: 10px 12px calc(12px + env(safe-area-inset-bottom));
      transform: translateY(120%);
      transition: transform 0.25s ease;
    }

    .checkout-bar.visible {
      transform: translateY(0);
    }

    .checkout-btn {
      width: 100%;
      max-width: calc(var(--max) - 24px);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 0;
      border-radius: 20px;
      padding: 16px 18px;
      background: linear-gradient(135deg, var(--text), #3a2a1d);
      color: #fff;
      box-shadow: 0 18px 45px rgba(32, 25, 18, 0.28);
      font: inherit;
      cursor: pointer;
    }

    .checkout-copy strong,
    .checkout-total strong {
      display: block;
      font-size: 0.98rem;
    }

    .checkout-copy span,
    .checkout-total span {
      display: block;
      font-size: 0.76rem;
      opacity: 0.72;
      margin-top: 2px;
    }

    @media (max-width: 420px) {
      .hero h1 {
        font-size: 1.9rem;
      }

      .name {
        font-size: 1.22rem;
      }

      .grid {
        gap: 10px;
      }

      .body {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" id="brandMark">ST</div>
        <div class="brand-copy">
          <p class="brand-name" id="storeName">Loading store...</p>
          <p class="brand-sub" id="storeTagline">Please wait</p>
        </div>
      </div>

      <button class="icon-btn" id="cartButton" type="button" aria-label="Open cart">
        <span id="cartBadge" class="cart-badge">0</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="20" cy="21" r="1"></circle>
          <path d="M1 1h4l2.68 13.4a2 2 0 0 0 2 1.6h9.72a2 2 0 0 0 2-1.6L23 6H6"></path>
        </svg>
      </button>
    </header>

    <section class="hero">
      <div class="eyebrow" id="heroEyebrow">Telegram Mini App</div>
      <h1 id="heroTitle">Curated for you</h1>
      <p id="heroSubtitle">Loading business details and product collection...</p>
      <div class="hero-meta">
        <div class="hero-chip" id="heroChipPrimary">Dynamic storefront</div>
        <div class="hero-chip" id="heroChipSecondary">0 products</div>
      </div>
    </section>

    <section class="panel">
      <div class="search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.3-4.3"></path>
        </svg>
        <input id="searchInput" type="text" placeholder="Search products, categories, tags..." />
      </div>

      <div class="section-head">
        <h2>Collections</h2>
        <div class="section-meta" id="collectionMeta">All products</div>
      </div>

      <div class="chips" id="categoryRow"></div>

      <div class="section-head">
        <h2 id="productsHeading">Products</h2>
        <div class="section-meta" id="resultMeta">Loading...</div>
      </div>

      <div class="grid" id="productsGrid"></div>
    </section>
  </div>

  <div class="sheet" id="detailSheet" aria-hidden="true">
    <div class="sheet-backdrop" id="detailBackdrop"></div>
    <div class="sheet-panel">
      <div class="sheet-handle"></div>

      <div class="detail-cover" id="detailCover"></div>

      <div class="detail-top">
        <div>
          <div class="cat" id="detailCategory">Category</div>
          <h3 id="detailName">Product Name</h3>
        </div>
        <button class="close-btn" id="detailClose" type="button" aria-label="Close">x</button>
      </div>

      <div class="detail-copy" id="detailDescription"></div>
      <div class="tag-row" id="detailTags"></div>

      <div class="detail-bar">
        <div class="detail-price" id="detailPrice">Rs 0</div>
        <button class="detail-add" id="detailAdd" type="button">Add to cart</button>
      </div>
    </div>
  </div>

  <div class="checkout-bar" id="checkoutBar">
    <button class="checkout-btn" id="checkoutButton" type="button">
      <div class="checkout-copy">
        <strong id="checkoutTitle">View cart</strong>
        <span id="checkoutSubtitle">0 items</span>
      </div>
      <div class="checkout-total">
        <strong id="checkoutTotal">Rs 0</strong>
        <span>Send to Telegram bot</span>
      </div>
    </button>
  </div>

  <script>
    const API_ENDPOINT = "/api/storefront";

    const state = {
      tg: null,
      tenantId: "",
      store: null,
      products: [],
      filtered: [],
      cart: {},
      activeCategory: "All",
      currentProduct: null
    };

    const el = (id) => document.getElementById(id);

    document.addEventListener("DOMContentLoaded", init);

    async function init() {
      state.tg = window.Telegram?.WebApp || null;

      setupTelegram();
      bindEvents();

      state.tenantId = resolveTenantId();
      state.cart = loadCart(state.tenantId);

      renderLoading();
      updateCartUI();

      await loadStorefront();
    }

    function setupTelegram() {
      if (!state.tg) return;

      state.tg.ready();
      state.tg.expand();

      const theme = state.tg.themeParams || {};
      if (theme.bg_color) {
        document.documentElement.style.setProperty("--bg", theme.bg_color);
      }
      if (theme.text_color) {
        document.documentElement.style.setProperty("--text", theme.text_color);
      }
      if (theme.hint_color) {
        document.documentElement.style.setProperty("--muted", theme.hint_color);
      }
      if (theme.button_color) {
        document.documentElement.style.setProperty("--brand", theme.button_color);
      }
      if (theme.secondary_bg_color) {
        document.documentElement.style.setProperty("--card-strong", theme.secondary_bg_color);
      }

      state.tg.BackButton.show();
      state.tg.BackButton.onClick(() => {
        if (el("detailSheet").classList.contains("open")) {
          closeDetail();
        } else {
          state.tg.close();
        }
      });
    }

    function bindEvents() {
      el("searchInput").addEventListener("input", filterProducts);

      el("categoryRow").addEventListener("click", (event) => {
        const chip = event.target.closest("[data-category]");
        if (!chip) return;
        state.activeCategory = chip.dataset.category;
        renderCategories();
        filterProducts();
      });

      el("productsGrid").addEventListener("click", (event) => {
        const addBtn = event.target.closest("[data-add-id]");
        if (addBtn) {
          event.stopPropagation();
          addToCart(addBtn.dataset.addId);
          return;
        }

        const card = event.target.closest("[data-product-id]");
        if (!card) return;
        openDetail(card.dataset.productId);
      });

      el("cartButton").addEventListener("click", checkout);
      el("checkoutButton").addEventListener("click", checkout);
      el("detailBackdrop").addEventListener("click", closeDetail);
      el("detailClose").addEventListener("click", closeDetail);

      el("detailAdd").addEventListener("click", () => {
        if (!state.currentProduct) return;
        addToCart(String(state.currentProduct.id));
        updateDetailButton();
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeDetail();
      });
    }

    function resolveTenantId() {
      const search = new URLSearchParams(window.location.search);
      const hash = new URLSearchParams(window.location.hash.replace(/^#/, ""));
      const tgStartParam = state.tg?.initDataUnsafe?.start_param;

      return (
        tgStartParam ||
        search.get("tenant") ||
        search.get("tenant_id") ||
        search.get("startapp") ||
        hash.get("tenant") ||
        "default"
      );
    }

    async function loadStorefront() {
      try {
        const response = await fetch(
          `${API_ENDPOINT}?tenant_id=${encodeURIComponent(state.tenantId)}`,
          {
            method: "GET",
            headers: {
              "Accept": "application/json"
            }
          }
        );

        if (!response.ok) {
          throw new Error(`Store request failed with ${response.status}`);
        }

        const payload = await response.json();
        const store = normalizeStore(payload);

        state.store = store;
        state.products = store.products;
        if (!state.products.length) {
          state.activeCategory = "All";
        }

        applyBrandTheme(store);
        renderStore(store);
        filterProducts();
        updateCartUI();
      } catch (error) {
        renderError(error.message || "Failed to load storefront");
      }
    }

    function normalizeStore(payload) {
      const source = payload?.store || payload || {};
      const products = Array.isArray(source.products)
        ? source.products.map(normalizeProduct)
        : [];

      const categoriesFromApi = Array.isArray(source.categories) ? source.categories : [];
      const derivedCategories = categoriesFromApi.length
        ? unique(["All", ...categoriesFromApi.filter(Boolean)])
        : buildCategories(products);

      const shopName =
        source.shop_name ||
        source.business_name ||
        source.name ||
        "Storefront";

      return {
        tenant_id: source.tenant_id || state.tenantId,
        shop_name: shopName,
        tagline: source.tagline || source.business_description || "Curated for Telegram",
        business_description: source.business_description || source.description || "",
        hero_title: source.hero_title || `Shop ${shopName}`,
        hero_subtitle:
          source.hero_subtitle ||
          source.business_description ||
          source.tagline ||
          "Explore products tailored for this business",
        accent_color: source.accent_color || "#ba7a38",
        logo_url: source.logo_url || "",
        currency_symbol: currencySymbol(source.currency || source.currency_symbol || "INR"),
        categories: derivedCategories,
        products
      };
    }

    function normalizeProduct(product, index) {
      return {
        id: String(product.id ?? index + 1),
        name: product.name || "Untitled Product",
        description: product.description || "No description available.",
        price: Number(product.price || 0),
        category: product.category || "General",
        image_url: product.image_url || product.image || "",
        emoji: product.emoji || "🛍",
        tags: Array.isArray(product.tags) ? product.tags : [],
        badge: product.badge || "",
        in_stock: product.in_stock !== false
      };
    }

    function applyBrandTheme(store) {
      const brand = normalizeHex(store.accent_color) || "#ba7a38";
      document.documentElement.style.setProperty("--brand", brand);
      document.documentElement.style.setProperty("--brand-deep", darkenHex(brand, 0.22));
      document.documentElement.style.setProperty("--brand-soft", hexToRgba(brand, 0.14));
    }

    function renderStore(store) {
      el("storeName").textContent = store.shop_name;
      el("storeTagline").textContent = store.tagline;
      el("heroTitle").textContent = store.hero_title;
      el("heroSubtitle").textContent = store.hero_subtitle;
      el("heroChipPrimary").textContent = store.tagline || "Business storefront";
      el("heroChipSecondary").textContent = `${store.products.length} products`;

      const firstName = state.tg?.initDataUnsafe?.user?.first_name;
      el("heroEyebrow").textContent = firstName
        ? `Welcome, ${firstName}`
        : "Telegram Mini App";

      const mark = el("brandMark");
      if (store.logo_url) {
        mark.innerHTML = `<img src="${escapeHtml(store.logo_url)}" alt="${escapeHtml(store.shop_name)}" />`;
      } else {
        mark.textContent = initials(store.shop_name);
      }

      renderCategories();
    }

    function renderCategories() {
      const categories = state.store?.categories || ["All"];
      el("collectionMeta").textContent = `${categories.length - 1} categories`;

      el("categoryRow").innerHTML = categories
        .map((category) => {
          const active = category === state.activeCategory ? " active" : "";
          return `<button class="chip${active}" type="button" data-category="${escapeHtml(category)}">${escapeHtml(category)}</button>`;
        })
        .join("");
    }

    function filterProducts() {
      const query = el("searchInput").value.trim().toLowerCase();

      state.filtered = state.products.filter((product) => {
        const inCategory =
          state.activeCategory === "All" || product.category === state.activeCategory;

        const inSearch =
          !query ||
          product.name.toLowerCase().includes(query) ||
          product.description.toLowerCase().includes(query) ||
          product.category.toLowerCase().includes(query) ||
          product.tags.some((tag) => String(tag).toLowerCase().includes(query));

        return inCategory && inSearch;
      });

      renderProducts(state.filtered);
    }

    function renderProducts(products) {
      el("productsHeading").textContent =
        state.activeCategory === "All" ? "Products" : state.activeCategory;

      el("resultMeta").textContent = `${products.length} result${products.length === 1 ? "" : "s"}`;

      if (!products.length) {
        el("productsGrid").innerHTML = `
          <div class="status-card">
            <h3>No products found</h3>
            <div>Try a different search or category.</div>
          </div>
        `;
        return;
      }

      el("productsGrid").innerHTML = products
        .map((product) => {
          const thumb = product.image_url
            ? `<img src="${escapeHtml(product.image_url)}" alt="${escapeHtml(product.name)}" loading="lazy" />`
            : `<div class="thumb-fallback">${escapeHtml(product.emoji)}</div>`;

          const badge = !product.in_stock
            ? `<div class="badge stock-out">Out of stock</div>`
            : product.badge
            ? `<div class="badge">${escapeHtml(product.badge)}</div>`
            : "";

          const addClass = state.cart[product.id] ? " added" : "";
          const addLabel = product.in_stock ? (state.cart[product.id] ? "✓" : "+") : "x";

          return `
            <article class="card" data-product-id="${escapeHtml(product.id)}">
              <div class="thumb">
                ${thumb}
                ${badge}
              </div>
              <div class="body">
                <div class="cat">${escapeHtml(product.category)}</div>
                <h3 class="name">${escapeHtml(product.name)}</h3>
                <p class="desc">${escapeHtml(product.description)}</p>
                <div class="card-foot">
                  <div class="price">${formatMoney(product.price)}</div>
                  <button
                    class="add${addClass}"
                    type="button"
                    data-add-id="${escapeHtml(product.id)}"
                    ${product.in_stock ? "" : "disabled"}
                    aria-label="Add to cart"
                  >${addLabel}</button>
                </div>
              </div>
            </article>
          `;
        })
        .join("");
    }

    function renderLoading() {
      el("categoryRow").innerHTML = `
        <div class="chip skeleton" style="width: 84px; height: 40px;"></div>
        <div class="chip skeleton" style="width: 110px; height: 40px;"></div>
        <div class="chip skeleton" style="width: 92px; height: 40px;"></div>
      `;

      const placeholders = new Array(6).fill(0).map(() => `
        <article class="card skeleton">
          <div class="thumb"></div>
          <div class="body">
            <div style="height: 10px; width: 36%; border-radius: 999px; background: rgba(0,0,0,0.08); margin-bottom: 10px;"></div>
            <div style="height: 24px; width: 72%; border-radius: 8px; background: rgba(0,0,0,0.08); margin-bottom: 10px;"></div>
            <div style="height: 13px; width: 100%; border-radius: 8px; background: rgba(0,0,0,0.08); margin-bottom: 8px;"></div>
            <div style="height: 13px; width: 72%; border-radius: 8px; background: rgba(0,0,0,0.08); margin-bottom: 14px;"></div>
            <div style="height: 38px; width: 100%; border-radius: 16px; background: rgba(0,0,0,0.08);"></div>
          </div>
        </article>
      `).join("");

      el("productsGrid").innerHTML = placeholders;
    }

    function renderError(message) {
      el("productsGrid").innerHTML = `
        <div class="status-card">
          <h3>Storefront could not load</h3>
          <div>${escapeHtml(message)}</div>
          <button type="button" onclick="loadStorefront()">Try again</button>
        </div>
      `;
      el("resultMeta").textContent = "Error";
    }

    function openDetail(productId) {
      const product = state.products.find((item) => String(item.id) === String(productId));
      if (!product) return;

      state.currentProduct = product;

      el("detailCategory").textContent = product.category;
      el("detailName").textContent = product.name;
      el("detailDescription").textContent = product.description;
      el("detailPrice").textContent = formatMoney(product.price);

      const tags = unique([product.category, ...(product.tags || [])]);
      el("detailTags").innerHTML = tags
        .map((tag) => `<div class="tag">${escapeHtml(tag)}</div>`)
        .join("");

      el("detailCover").innerHTML = product.image_url
        ? `<img src="${escapeHtml(product.image_url)}" alt="${escapeHtml(product.name)}" />`
        : `<div class="detail-fallback">${escapeHtml(product.emoji)}</div>`;

      updateDetailButton();
      el("detailSheet").classList.add("open");
      el("detailSheet").setAttribute("aria-hidden", "false");

      impact("light");
    }

    function closeDetail() {
      state.currentProduct = null;
      el("detailSheet").classList.remove("open");
      el("detailSheet").setAttribute("aria-hidden", "true");
    }

    function updateDetailButton() {
      if (!state.currentProduct) return;

      const qty = state.cart[state.currentProduct.id] || 0;
      const button = el("detailAdd");

      if (!state.currentProduct.in_stock) {
        button.textContent = "Out of stock";
        button.disabled = true;
        button.style.opacity = "0.6";
        return;
      }

      button.disabled = false;
      button.style.opacity = "1";
      button.textContent = qty ? `Add one more (${qty} in cart)` : "Add to cart";
    }

    function addToCart(productId) {
      const product = state.products.find((item) => String(item.id) === String(productId));
      if (!product || !product.in_stock) return;

      state.cart[product.id] = (state.cart[product.id] || 0) + 1;
      persistCart();
      updateCartUI();
      filterProducts();
      impact("medium");
    }

    function updateCartUI() {
      const count = cartCount();
      const total = cartTotal();

      el("cartBadge").textContent = count;
      el("cartBadge").style.display = count ? "grid" : "none";

      el("checkoutBar").classList.toggle("visible", count > 0);
      el("checkoutTitle").textContent = state.store?.shop_name || "View cart";
      el("checkoutSubtitle").textContent = `${count} item${count === 1 ? "" : "s"} selected`;
      el("checkoutTotal").textContent = formatMoney(total);

      if (state.tg?.MainButton) {
        if (count > 0) {
          state.tg.MainButton.setText(`Checkout ${formatMoney(total)}`);
          state.tg.MainButton.show();
          state.tg.MainButton.onClick(checkout);
        } else {
          state.tg.MainButton.hide();
        }
      }
    }

    function checkout() {
      const count = cartCount();
      if (!count) return;

      const items = Object.entries(state.cart).map(([id, qty]) => {
        const product = state.products.find((item) => String(item.id) === String(id));
        return {
          id,
          name: product?.name || "Unknown",
          price: Number(product?.price || 0),
          quantity: qty,
          subtotal: Number(product?.price || 0) * qty
        };
      });

      const payload = {
        action: "checkout",
        tenant_id: state.store?.tenant_id || state.tenantId,
        shop_name: state.store?.shop_name || "Storefront",
        total: cartTotal(),
        item_count: count,
        items
      };

      if (state.tg) {
        state.tg.sendData(JSON.stringify(payload));
        impact("heavy");
        return;
      }

      alert(JSON.stringify(payload, null, 2));
    }

    function buildCategories(products) {
      return unique(["All", ...products.map((item) => item.category).filter(Boolean)]);
    }

    function cartCount() {
      return Object.values(state.cart).reduce((sum, qty) => sum + qty, 0);
    }

    function cartTotal() {
      return Object.entries(state.cart).reduce((sum, [id, qty]) => {
        const product = state.products.find((item) => String(item.id) === String(id));
        return sum + (product ? product.price * qty : 0);
      }, 0);
    }

    function persistCart() {
      try {
        localStorage.setItem(cartKey(state.tenantId), JSON.stringify(state.cart));
      } catch (_) {}
    }

    function loadCart(tenantId) {
      try {
        return JSON.parse(localStorage.getItem(cartKey(tenantId)) || "{}");
      } catch (_) {
        return {};
      }
    }

    function cartKey(tenantId) {
      return `telegram-miniapp-cart:${tenantId}`;
    }

    function formatMoney(value) {
      const symbol = state.store?.currency_symbol || "Rs";
      return `${symbol}${Number(value || 0).toLocaleString("en-IN")}`;
    }

    function currencySymbol(currency) {
      const code = String(currency).toUpperCase();
      if (code === "INR" || code === "RS" || code === "RUPEE" || code === "₹") return "₹";
      if (code === "USD" || code === "$") return "$";
      if (code === "EUR" || code === "€") return "€";
      if (code === "GBP" || code === "£") return "£";
      return String(currency).length <= 3 ? `${currency} ` : "₹";
    }

    function initials(text) {
      return String(text || "ST")
        .trim()
        .split(/\s+/)
        .slice(0, 2)
        .map((part) => part[0]?.toUpperCase() || "")
        .join("");
    }

    function impact(style) {
      state.tg?.HapticFeedback?.impactOccurred?.(style || "medium");
    }

    function unique(arr) {
      return [...new Set(arr)];
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalizeHex(value) {
      const hex = String(value || "").trim();
      return /^#[0-9A-Fa-f]{6}$/.test(hex) ? hex : "";
    }

    function hexToRgba(hex, alpha) {
      const clean = normalizeHex(hex);
      if (!clean) return `rgba(186, 122, 56, ${alpha})`;
      const r = parseInt(clean.slice(1, 3), 16);
      const g = parseInt(clean.slice(3, 5), 16);
      const b = parseInt(clean.slice(5, 7), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function darkenHex(hex, amount) {
      const clean = normalizeHex(hex);
      if (!clean) return "#8d5822";
      const clamp = (n) => Math.max(0, Math.min(255, n));
      const factor = 1 - amount;
      const r = clamp(Math.round(parseInt(clean.slice(1, 3), 16) * factor));
      const g = clamp(Math.round(parseInt(clean.slice(3, 5), 16) * factor));
      const b = clamp(Math.round(parseInt(clean.slice(5, 7), 16) * factor));
      return `#${[r, g, b].map((n) => n.toString(16).padStart(2, "0")).join("")}`;
    }
  </script>
</body>
